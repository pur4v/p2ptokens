name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: p2ptokens-macos-arm64.tar.gz
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            asset: p2ptokens-macos-x64.tar.gz
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: p2ptokens-linux-x64.tar.gz
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: p2ptokens-windows-x64.zip
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bins

      - name: Package binaries (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "${{ github.workspace }}/${{ matrix.asset }}" p2ptokens p2p-coordinator

      - name: Package binaries (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path `
            "target/${{ matrix.target }}/release/p2ptokens.exe", `
            "target/${{ matrix.target }}/release/p2p-coordinator.exe" `
            -DestinationPath "${{ github.workspace }}/${{ matrix.asset }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true
