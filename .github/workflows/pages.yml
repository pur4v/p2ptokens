name: Deploy site + docs to GitHub Pages

# Publishes the static `site/` directory (landing page at /, docs at /docs/) to
# GitHub Pages. Enable once: repo Settings → Pages → Source = "GitHub Actions".
# Optional: add a CNAME (p2ptokens.com) in Pages settings for a custom domain.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
