<svg xmlns="http://www.w3.org/2000/svg" width="720" height="210" viewBox="0 0 720 210" role="img" aria-label="P2P TOKENS — distributed peer-to-peer LLM inference">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#0b0f0b"/>
      <rect width="4" height="1" y="2" fill="#000000" opacity="0.18"/>
    </pattern>
  </defs>

  <rect x="1.5" y="1.5" width="717" height="207" rx="12" fill="url(#scan)" stroke="#1f5a3a" stroke-width="2"/>

  <text x="360" y="98" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="74" font-weight="700" letter-spacing="6"
        fill="#33ff88" filter="url(#glow)">P2P TOKENS</text>

  <text x="360" y="142" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="21" font-weight="700" letter-spacing="2" fill="#ffb000">Distributed peer-to-peer LLM inference</text>

  <text x="360" y="172" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="13" letter-spacing="1" fill="#4f7a63">distributed inferencing · seed tokens · leech tokens · no middleman</text>
</svg>
